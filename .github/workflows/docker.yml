name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"   # elke 15 minuten upstream check

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout eigen repo
      - name: Check out repository
        uses: actions/checkout@v4

      # 🔹 Check upstream Wetty commit
      - name: Check upstream Wetty commit
        id: upstream
        run: |
          LATEST=$(git ls-remote https://github.com/butlerx/wetty.git main | awk '{print $1}')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      # 🔹 Cache commit zodat we weten of er iets veranderd is
      - name: Cache upstream commit
        id: cache
        uses: actions/cache@v4
        with:
          path: .wetty_commit
          key: wetty-${{ steps.upstream.outputs.latest }}

      # 🔹 Bepalen of build nodig is
      - name: Determine if build is needed
        id: should_build
        run: |
          if [ -f .wetty_commit ]; then
            echo "build=false" >> $GITHUB_OUTPUT
          else
            echo "${{ steps.upstream.outputs.latest }}" > .wetty_commit
            echo "build=true" >> $GITHUB_OUTPUT
          fi

      # 🔹 QEMU (multi-arch)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 🔹 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔹 Login GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🔹 Metadata (tags + labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      # 🔥 Build & push (alleen indien nodig)
      - name: Build and push Docker image
        if: steps.should_build.outputs.build == 'true' || github.event_name != 'schedule'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
